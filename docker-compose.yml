services:
  db:
    image: postgres:15-alpine
    container_name: despesas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: despesas_db
      POSTGRES_USER: despesas_user
      POSTGRES_PASSWORD: despesas_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U despesas_user -d despesas_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - despesas_network

  web:
    build: .
    container_name: despesas_system
    restart: unless-stopped
    volumes:
      - .:/app
      - ./media:/app/media
      - staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - despesas_network

volumes:
  postgres_data:
  staticfiles:

networks:
  despesas_network:
    driver: bridge
